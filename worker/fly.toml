# fly.toml app configuration file generated for broadway-scraper-worker on 2026-04-15T12:29:47-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'broadway-scraper-worker'
primary_region = 'ewr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine always-on: scrape jobs run in background threads for
  # hours after the short /run POST returns. With autostop enabled, Fly's
  # proxy sees no inbound traffic and sends SIGINT mid-scan, leaving jobs
  # stuck in 'running' state. ~$5/mo for the shared-cpu-1x to stay up.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
